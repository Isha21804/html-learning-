<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
       <u> <h1>CSJM UNIVERSITY, KANPUR</h1></u>
        <h2>Student Regestration Form</h2> <hr>
    <section>
    <u><h3>Personal Details</h3></u>
    </header>

    <form action="#/contact.me">

    <label for="name">Fullname:</label>
    <input type="text" id="name" name="name" required > 

    <label for="email">Email:</label>
    <input type="text" id="email" name="email" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <label for="dob">Date of birth:</label>
    <input type="date" id="dob" name="dob" required> 

    <label for="no">Contact no:</label>
    <input type="text" id="no" name="no" required>  <br>
  </section>

  <section>
  <u><h3>Gender</h3></u>
  <label for="male">Male</label>
  <input type="radio" name="Gender" id="male" value="male">

  <label for="female">Female</label>
  <input type="radio" name="Gender" id="female" value="female">
  
  <label for="other">Other</label>
  <input type="radio" name="Gender" id="other" value="other">
  </section>

  <section>
    <u><h3>Course Selection</h3></u>
   <label for="course">Select your course</label>
    <select name="course" id="course">
          <option value="bca">BCA</option>
          <option value="btech">B.Tech</option>
          <option value="bba">BBA</option>
          <option value="ba">BA</option>
          <option value="bcom">B.com</option>
          <option value="bsce">Bsce</option>
          <option value="ma">MA</option>
          <option value="m.com">M.com</option>
          <option value="m.sce">M.sce</option>
          <option value="mca">MCA</option>
          <option value="m.com">M.com</option>
          <option value="other">Other</option> <hr>
    </select>
  </section>

  <section>
    <u><h3>Skills</h3></u>
    <label for="html">Html</label>
    <input type="checkbox" id="html" name="Skills"> <br>

    <label for="css">CSS</label>
    <input type="checkbox" id="css" name="Skills"> <br>

    <label for="java">Java</label>
    <input type="checkbox" id="java" name="Skills"> <br>

    <label for="Python">Python</label>
    <input type="checkbox" id="python" name="Skills"> <br>

    <label for="ruby">Ruby</label>
    <input type="checkbox" id="ruby" name="Skills"> <br>

    <label for="react js">React JS</label>
    <input type="checkbox" id="react js" name="Skills"> <br>

    <label for="java script">Java Script</label>
    <input type="checkbox" id="java script" name="Skills"> <br>

    <label for="node js">Node JS</label>
    <input type="checkbox" id="node js" name="Skills"> <br>

    <label for="angular">Angular</label>
    <input type="checkbox" id="angular" name="Skills"> <br>

    <label for="c">C</label>
    <input type="checkbox" id="c" name= "Skills"> <br>

    <label for="c++">C++</label>
    <input type="checkbox" id="c++" name="Skills"> <hr>
  </section>

  <section>
   <u> <h3>Address</h3></u>
   <h4>Permanent Address</h4>
   <label for="house">Locality and house no.</label>
    <input type="text" id="house">

    <label for="pin">Pincode</label>
    <input type="text" id="pin">

    <label for="state"> State</label>
    <input type="text" id="state">

    <label for="country">Country</label>
    <input type="text" id="country">

     <h4>Default Address</h4>
    <textarea name="address" id="address" cols="30" rows="5
    ">Enter your full address</textarea>
  </section>

  <section>
    <label for="declare"></label>
    <input type="checkbox" id="declare"name="declare">
    I hereby decalre that the above information is truly correct and clear.
  </section>

  <section>
    <input type="button" value="Save">
    <input type="submit" value="submit">
    </section>

    </form>
    <footer>
    <p> &copy; 2026 CSJM University Kanpur | All rights</p> <hr>
    </footer>
</body>
</html>
