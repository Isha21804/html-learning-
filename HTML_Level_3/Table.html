<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        <caption>Accenture</caption>
        <tr>
            <th colspan="3">Employee's data</th>
        </tr>
        <tr>
            <th>Name</th>
            <th>Profession</th>
            <th>Experience</th>
        </tr>
        <tr>
            <td>Isha</td>

        </tr>
        <tr>
         <td>Neha</td>

         </tr>
       <tr>
         <td>Arun</td>
         <td>HR Recruiter</td>
         <td>5 yrs</td>
         </tr>
     <tr>
         <td>Reyansh</td>
         <td>Teacher</td>
         <td>6 yrs</td>
        </tr>
        <tr>
         <td>Sanchi</td>
         <td>JS Developer</td>
         <td>2 yrs</td>
        </tr>
    </table>
    <!--Table tag shows data in tabular format-->
    <!--th defines the heading-->
    <!--tr defines the row-->
    <!--td defines data cells within a row-->
</body>
</html>
