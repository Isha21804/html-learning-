<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            height: 100px;
            width: 100px;           
         }
         .box{
            position: absolute;
            border: 3px solid black;
            text-align: center;
            font-size: 25px;
         }
        #box1{
            background-color:blueviolet;
            top: 40px;
            left: 50px;
            z-index: 2;
        }
        #box2{
            background-color: lightcoral;
            top: 75px;
            left: 30px;
            z-index: 1;
        }

    </style>
</head>
<body>
    <div id="box1" class="box">Z-index1</div>
    <div id="box2" class="box">Z-index2</div>
</body>
</html>
