<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            height: 500px;
            width: 1000px;
            border: 2px solid black;
            background-color: cornsilk;
            display: flex;
            /* flex-direction: row-reverse; */
            /* flex-direction: column; */
            flex-direction: column-reverse;
        }
        .box{
            height: 100px;
            width: 100px;
            margin: 5px;
            border: 2px solid black;
            padding: 2px;
        }
        #flex1{
            background-color: darksalmon;
        }
        #flex2{
            background-color: darksalmon;
        }
        #flex3{
            background-color: darksalmon;
        }
        #flex4{
            background-color: darksalmon;
        }
    </style>
</head>
<body>
    <h1>Flex Container</h1>
    <div id="container">    
        <div id="flex1" class="box">Item1</div>
        <div id="flex2" class="box">Item2</div>
        <div id="flex3" class="box">Item3</div>
        <div id="flex4" class="box">Item4</div>
    </div>
</body>
</html>
