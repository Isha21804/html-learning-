<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 2px solid red;
            height: 300px;
            width: 600px;
            padding: 10px;
            margin: 20px;
            display: grid;
            grid-template-columns: 80px 100px ;
            grid-template-rows: 50px 100px;
        }
        .box{
            height: 75px;
            width: 75px;
            border: 2px solid black;
            margin: 2px;
            
        }
        #box1{
            background-color: aquamarine;
            grid-row: 1/2;
            grid-column: 1/2;

        }
        #box2{
            background-color:blanchedalmond;
            grid-row: 1/2;
            grid-column: 2/2;
        }
        #box3{
            background-color:cornflowerblue;
             grid-row: 2/2;
            grid-column: 1/2;
        }
        #box4{
            background-color:darksalmon;
             grid-row: 2/2;
            grid-column: 2/2;
        }

    </style>
</head>
<body>
    <h1>Grid-container</h1>
    <div id="container">
    <div id="box1" class="box">item1</div>
    <div id="box2" class="box">item2</div>
    <div id="box3" class="box">item3</div>
    <div id="box4" class="box">item4</div>
    </div>
</body>
</html>
