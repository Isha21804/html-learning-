<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #head{
            background-color: cadetblue;
            text-decoration: underline;
            text-decoration-color: chocolate;
        }
         #head2{
            background-color: cadetblue;
            text-decoration: overline;
            text-decoration-color: forestgreen;
        }
         #head3{
            background-color: cadetblue;
            text-decoration: line-through;
        }
        #head4{
            background-color: darkkhaki;
            text-decoration: underline;
            text-decoration-style: dashed;
        }
         #head5{
            background-color: darkkhaki;
            text-decoration: underline;
            text-decoration-style:dotted;
        }
         #head6{
            background-color: darkkhaki;
            text-decoration: underline;
            text-decoration-style:double;
            text-decoration-color: fuchsia;
        }
         #head7{
            background-color: darkkhaki;
            text-decoration: underline;
            text-decoration-style:solid;
            text-decoration-color: darkmagenta;
        }
           #head8{
            background-color: darkkhaki;
            text-decoration: underline;
            text-decoration-style:wavy;
            text-decoration-color: brown;
           }
         #link{
           
            text-decoration:none;
              }
    </style>
</head>
<body>
    <h1 id="head">This is text-decoration</h1>
    <h1 id="head2">This is text-decoration</h1>
    <h1 id="head3">This is text-decoration</h1>

    <h1 id="head4">This is text-decoration-style</h1>
    <h1 id="head5">This is text-decoration-style</h1>
    <h1 id="head6">This is text-decoration-style</h1>
    <h1 id="head7">This is text-decoration-style</h1>
    <h1 id="head8">This is text-decoration-style</h1>

  <a href="#"id="link">This is the link</a>
</body>
</html>
