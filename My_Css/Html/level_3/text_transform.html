<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #a{
            text-transform: capitalize;
        }
        #b{
            text-transform: lowercase;
        }#c{
            text-transform:uppercase;
        }
        #d{
            text-transform: none;
        }
    </style>
</head>
<body>
    <h1 id="a">Text-transform property</h1>
    <h1 id="b">Text-transform property</h1>
    <h1 id="c">Text-transform property</h1>
    <h1 id="d">Text-transform property</h1>
</body>
</html>
