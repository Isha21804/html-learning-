<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
     .scale{
            height: 50px;
            width: 50px;
            margin: 80px;
            padding: 5px;
            border: 2px solid black;
            transition: all 2s ease;}
        #box1{
            background-color: cornflowerblue;
            }
            #box1:hover{
            transform: scale(2);
        }
        #box2{
            background-color:darkturquoise;
            }
            #box2:hover{
            transform: scale(4);
            }
        #box3{
            background-color:plum;
            }
            #box3:hover{
            transform: scalex(2);
            }
        #box4{
            background-color:darksalmon;
            }
            #box4:hover{
            transform: scaley(3);
            }
</style>
<body>
    <div id="box1"class="scale">Scale</div>
    <div id="box2"class="scale">Scale</div>
    <div id="box3"class="scale">Scale</div>
    <div id="box4"class="scale">Scale</div>
</body>
</html>
