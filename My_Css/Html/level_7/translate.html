<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
     .translate{
            height: 70px;
            width: 70px;
            margin: 80px;
            padding: 5px;
            border: 2px solid black;
            transition: all 2s ease;}
        #box1{
            background-color: cornflowerblue;
            }
            #box1:hover{
            transform: translate(50px);
        }
        #box2{
            background-color:darkturquoise;
            }
            #box2:hover{
            transform: translate(50px ,50px);
            }
        #box3{
            background-color:plum;
            }
            #box3:hover{
            transform: translatex(50px);
            }
        #box4{
            background-color:darksalmon;
            }
            #box4:hover{
            transform: translatey(50px);
            }
</style>
<body>
    <div id="box1"class="translate">translate 50px</div>
    <div id="box2"class="translate">translate 50px,50px</div>
    <div id="box3"class="translate">translate X 50px</div>
    <div id="box4"class="translate">translate Y 50px </div>
</body>  
</html>
